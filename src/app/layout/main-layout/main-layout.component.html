<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="brand-mark">H</div>

      <div class="brand-text">
        <h2>HCE</h2>
        <span>Sistema clínico</span>
      </div>
    </div>

    <nav class="menu">

  <a routerLink="/dashboard" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">

      </svg>
    </span>
    <span>Dashboard</span>
  </a>

  <a routerLink="/pacientes" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3ZM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13Zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5Z"/>
      </svg>
    </span>
    <span>Pacientes</span>
  </a>

  <a routerLink="/citas" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M7 2h2v2h6V2h2v2h3c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h3V2Zm13 8H4v10h16V10ZM4 8h16V6H4v2Zm3 4h4v4H7v-4Z"/>
      </svg>
    </span>
    <span>Citas</span>
  </a>

  <a routerLink="/historias-clinicas" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M6 2h9l5 5v15c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2Zm8 1.5V8h4.5L14 3.5ZM8 12h8v2H8v-2Zm0 4h8v2H8v-2Zm0-8h4v2H8V8Z"/>
      </svg>
    </span>
    <span>Historia Clínica</span>
  </a>

  <a routerLink="/prediccion" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2c1.1 0 2 .9 2 2v1h2c1.1 0 2 .9 2 2v2h1c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2h-1v2c0 1.1-.9 2-2 2h-2v1c0 1.1-.9 2-2 2s-2-.9-2-2v-1H8c-1.1 0-2-.9-2-2v-2H5c-1.1 0-2-.9-2-2v-2c0-1.1.9-2 2-2h1V7c0-1.1.9-2 2-2h2V4c0-1.1.9-2 2-2Zm-4 5v10h8V7H8Zm2 3h4v2h-4v-2Zm0 4h4v2h-4v-2Z"/>
      </svg>
    </span>
    <span>Predicción</span>
  </a>

  <a routerLink="/sincronizacion" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 4c2.1 0 4.01.81 5.43 2.14L15 8.57h7V1.57l-2.45 2.45C17.55 2.15 14.9 1 12 1 6.93 1 2.69 4.55 1.26 9.3l2.87.86C5.17 6.6 8.32 4 12 4Zm0 16c-2.1 0-4.01-.81-5.43-2.14L9 15.43H2v7l2.45-2.45C6.45 21.85 9.1 23 12 23c5.07 0 9.31-3.55 10.74-8.3l-2.87-.86C18.83 17.4 15.68 20 12 20Z"/>
      </svg>
    </span>
    <span>Sincronización</span>
  </a>

  <a routerLink="/reportes" routerLinkActive="active">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24">
        <path d="M4 19h16v2H4v-2Zm2-8h3v6H6v-6Zm5-6h3v12h-3V5Zm5 3h3v9h-3V8Z"/>
      </svg>
    </span>
    <span>Reportes</span>
  </a>

</nav>

  </aside>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- HEADER -->
    <header class="top-header">

      <div class="header-title">
        <h3>Sistema HCE</h3>
        <span>Gestión de historias clínicas</span>
      </div>

      <div class="header-actions">

        <button class="notification-btn" title="Notificaciones">
          🔔
          <span class="notification-badge">3</span>
        </button>

        <div class="user-menu">

          <button class="user-menu-btn" (click)="toggleUserMenu()">
            <span class="user-avatar">
              {{ (usuario?.nombres || usuario?.username || 'U').charAt(0) }}
            </span>

            <span class="user-name">
              {{ usuario?.nombres || usuario?.username || 'Usuario' }}
            </span>

            <span class="chevron">⌄</span>
          </button>

          <div class="dropdown" *ngIf="mostrarMenuUsuario">
            <div class="dropdown-user">
              <strong>{{ usuario?.nombres || usuario?.username || 'Usuario' }}</strong>
              <small>{{ usuario?.rol || 'Usuario' }}</small>
            </div>

            <button routerLink="/configuracion">Configuración</button>
            <button routerLink="/perfil">Mi perfil</button>
            <button class="logout" (click)="logout()">Cerrar sesión</button>
          </div>

        </div>

      </div>

    </header>

    <!-- CONTENIDO DINÁMICO -->
    <main>
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
