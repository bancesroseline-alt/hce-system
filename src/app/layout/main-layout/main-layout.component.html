<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>HCE</h2>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/pacientes" routerLinkActive="active">Pacientes</a>
      <a routerLink="/citas" routerLinkActive="active">Citas</a>
      <a routerLink="/historias-clinicas" routerLinkActive="active">Historia Clínica</a>
      <a routerLink="/prediccion" routerLinkActive="active">Predicción</a>
      <a routerLink="/sincronizacion" routerLinkActive="active">Sincronización</a>
      <a routerLink="/reportes" routerLinkActive="active">Reportes</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- HEADER -->
    <header class="top-header">
  <h3>Sistema HCE</h3>

  <div class="header-actions">
    <button class="notification-btn" title="Notificaciones">
      🔔
      <span class="notification-badge">3</span>
    </button>

    <div class="user-menu">
      <button class="user-menu-btn" (click)="toggleUserMenu()">
        👤
        <span>{{ usuario?.nombres || usuario?.username || 'Usuario' }}</span>
        <span>⌄</span>
      </button>

      <div class="dropdown" *ngIf="mostrarMenuUsuario">
        <div class="dropdown-user">
          <strong>{{ usuario?.nombres || usuario?.username || 'Usuario' }}</strong>
          <small>{{ usuario?.rol || 'Usuario' }}</small>
        </div>

        <button routerLink="/configuracion">⚙️ Configuración</button>
        <button routerLink="/perfil">👤 Mi perfil</button>
        <button class="logout" (click)="logout()">🚪 Cerrar sesión</button>
      </div>
    </div>
  </div>
</header>
    <!-- CONTENIDO DINÁMICO -->
    <main>
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
