<div class="layout">

  <aside class="sidebar">

    <div class="brand">
      <div class="brand-mark">H</div>

      <div class="brand-text">
        <h2>HCE</h2>
        <span>Sistema clinico</span>
      </div>
    </div>

    <nav class="menu">
      <a *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path [attr.d]="item.icon"></path>
          </svg>
        </span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

  </aside>

  <div class="content">

    <header class="top-header">

      <div class="header-title">
        <h3>Sistema HCE</h3>
        <span>Gestion de historias clinicas</span>
      </div>

      <div class="header-actions">

        <button class="notification-btn" title="Notificaciones">
          <span>!</span>
          <span class="notification-badge">3</span>
        </button>

        <div class="user-menu">

          <button class="user-menu-btn" (click)="toggleUserMenu()">
            <span class="user-avatar">
              {{ (usuario?.nombres || usuario?.username || 'U').charAt(0) }}
            </span>

            <span class="user-name">
              {{ usuario?.nombres || usuario?.username || 'Usuario' }}
            </span>

            <span class="chevron">v</span>
          </button>

          <div class="dropdown" *ngIf="mostrarMenuUsuario">
            <div class="dropdown-user">
              <strong>{{ usuario?.nombres || usuario?.username || 'Usuario' }}</strong>
              <small>{{ usuario?.rol || 'Usuario' }}</small>
            </div>

            <button routerLink="/dashboard">Dashboard</button>
            <button class="logout" (click)="logout()">Cerrar sesion</button>
          </div>

        </div>

      </div>

    </header>

    <main>
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
